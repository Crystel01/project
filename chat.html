<!DOCTYPE html>
<html lang="de-x-formal" dir="ltr" class="client-nojs">
<head>
    <title>My famous Chat</title>
    <!-- Update Chat alle 69s, updatet aber auch Eingabe: nicht länger als 69s schreiben-->
    <meta http-equiv="refresh" content="69">
</head>

<body>
<h1>My Chat</h1>
If you seach for a professional chat use <a href="http://www.google.de">Google</a>.
<p>
Hi, now I am HTML from a template.
</p>

<!--Formatiert Tabelle für Textnachrichten -->
<table border="1">
    <tr>
        <th>Name</th>
        <th>Text</th>
        <th>Zeitpunkt</th>
    </tr>
    {% for name, text, time in messages %}
        <tr>
        <td>{{name}}</td>
        <td>{{text}}</td>
        <td>{{time}}</td>
        </tr>
    {% endfor %}
</table>

<form action="/main/{{ chat_id }}?name={{ name }}" method="POST">
    <p>
    
    Nachricht:
    <input type="text" name="new_message">
    <br>
    <input type="submit" value="Senden">
    </p>
    </form>
</body>
</html>
