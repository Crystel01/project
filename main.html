<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klickbare Box mit Leiste</title>
    
    <style>
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://www.travelmanagers.com.au/wp-content/uploads/2016/04/iStock_000068142299_Medium.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); 
            z-index: -1; 
            transform: scale(1.05); 
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding-top: 80px; 
            text-align: center;
        }

        .top-leiste {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            color: white;
            padding: 15px 30px; 
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center; 
        }

        .top-leiste::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 150%; 
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            z-index: -1; 
            pointer-events: none; 
        }

        .top-leiste a.dropbtn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .top-leiste a.dropbtn:hover {
            color: #ff6200;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%; 
            left: 0;
            background-color: rgba(0, 0, 0, 0.8); 
            min-width: 160px;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 15px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); 
        }

        .dropdown-right .dropdown-content {
            left: auto;
            right: 0;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block; 
            text-align: left;
        }

        .dropdown-content a:hover {
            background-color: #ff6200;
            color: white;
        }

        .show {
            display: block;
        }

        .klick-box {
            display: inline-block;
            padding: 20px 40px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            margin: 10px;
        }

        .box-blau { background-color: #007bff; }
        .box-blau:hover { background-color: #0060c7; }

        .box-orange { background-color: #ff8400; }
        .box-orange:hover { background-color: #e64500; }

        .box-gruen { background-color: #34c200; }
        .box-gruen:hover { background-color: #00851d; }

        .box-lila { background-color: #ce00d2; }
        .box-lila:hover { background-color: #81007f; }
        
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px);
            z-index: -1;
            transform: scale(1.05);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .bg-blau { background-image: url('https://bilder.deutschlandfunk.de/FI/LE/_b/79/FILE_b7937e80e16b62fae5039dc84b56db0e/imago16566607h-jpg-102-1920x1080.jpg'); }
        .bg-orange { background-image: url('https://camper.help/wp-content/uploads/Tic-Tac-Toe-Spielzuege-deutlich-komplexer-scaled.jpeg'); }
        .bg-gruen { background-image: url('https://www.kindernetz.de/wissen/1653530177787%2Cwuesten-sahara-102~_v-16x9@2dL_-6c42aff4e68b43c7868c3240d3ebfa29867457da.jpg'); }
        .bg-lila { background-image: url('https://images.tagesschau.de/image/d3bb5a2e-fcf7-42fe-bfe4-b3b414fe8bda/AAABnG8n3ow/AAABmyZE0EA/16x9-big/podcast-11km-3318.jpg?width=768'); }

        body:has(.box-blau:hover) .bg-blau { opacity: 1; }
        body:has(.box-orange:hover) .bg-orange { opacity: 1; }
        body:has(.box-gruen:hover) .bg-gruen { opacity: 1; }
        body:has(.box-lila:hover) .bg-lila { opacity: 1; }

    </style>
</head>

<body>
    <div class="bg-layer bg-blau"></div>
    <div class="bg-layer bg-orange"></div>
    <div class="bg-layer bg-gruen"></div>
    <div class="bg-layer bg-lila"></div>

    <nav class="top-leiste">
        <div class="dropdown">
            <a href="#" class="dropbtn" onclick="toggleDropdown(event, 'menu-links')">☰ Menu</a>
            <div id="menu-links" class="dropdown-content">
                <a href="#">My Games</a>
                <a href="#">Highscores</a>
                <a href="#">Logout</a>
            </div>
        </div>

        <div style="font-size: 20px; font-weight: bold; letter-spacing: 1px;">Hello <span id="username">{username}</span>!</div>

        <div class="dropdown dropdown-right">
            <a href="#" class="dropbtn" onclick="toggleDropdown(event, 'settings-links')">Settings ⚙</a>
            <div id="settings-links" class="dropdown-content">
                <a href="#">Konto</a>
                <a href="#">Audio</a>
                <a href="#">Graphic</a>
            </div>
        </div>
    </nav>

    <h1>Please choose a game:</h1>

    <a href="https://www.google.de" target="_blank" class="klick-box box-blau">
        Chess
    </a>

    <a href="https://www.google.de" target="_blank" class="klick-box box-orange">
        Tic Tac Toe
    </a>

    <br>

    <a href="https://www.google.de" target="_blank" class="klick-box box-gruen">
        Poker
    </a>

    <a href="https://www.google.de" target="_blank" class="klick-box box-lila">
        Game 4
    </a>

    <p style="margin-top: 800px; color: white; font-weight: bold;">Hello</p>

    <script>
        function toggleDropdown(event, menuId) {
            event.preventDefault(); 

            let allMenus = document.querySelectorAll('.dropdown-content');
            allMenus.forEach(menu => {
                if (menu.id !== menuId) {
                    menu.classList.remove('show');
                }
            });

            document.getElementById(menuId).classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                let dropdowns = document.querySelectorAll('.dropdown-content');
                dropdowns.forEach(menu => {
                    if (menu.classList.contains('show')) {
                        menu.classList.remove('show');
                    }
                });
            }
        }
    </script>
</body>
</html>
