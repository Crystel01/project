<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='stylesheet.css')}}">
    <title>Main</title>
    
    <style>
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://www.travelmanagers.com.au/wp-content/uploads/2016/04/iStock_000068142299_Medium.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); 
            z-index: -1; 
            transform: scale(1.05); 
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            padding-top: 80px; 
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 3rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-top: 40px;
            margin-bottom: 50px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            position: relative;
            display: inline-block;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px);
            z-index: -1;
            transform: scale(1.05);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .bg-singleplayer { background-image: url('https://bilder.deutschlandfunk.de/FI/LE/_b/79/FILE_b7937e80e16b62fae5039dc84b56db0e/imago16566607h-jpg-102-1920x1080.jpg'); }
        .bg-multiplayer { background-image: url('https://camhttps://tse1.mm.bing.net/th/id/OIP.Vrxt2FlLB7JBY3y6jNa6MAHaE1?rs=1&pid=ImgDetMain&o=7&rm=3per.help/wp-content/uploads/Tic-Tac-Toe-Spielzuege-deutlich-komplexer-scaled.jpeg'); }

        body:has(.box-singleplayer:hover) .bg-singleplayer { opacity: 1; }
        body:has(.box-multiplayer:hover) .bg-multiplayer { opacity: 1; }

        .game-grid {
            display: flex;
            justify-content: center;
            gap: 150px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .klick-box {
            display: inline-block;
            padding: 20px 40px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            width: 200px; 

            border: 2px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
            
            transition: all 0.3s ease; 
        }

        .klick-box:hover {
            border-color: rgba(255, 255, 255, 0.9);
        }

        .box-singleplayer { background-color: #e98f4a; }
        .box-singleplayer:hover { background-color: #af652c; }

        .box-multiplayer { background-color: #e98f4a; }
        .box-multiplayer:hover { background-color: #af652c; }



        .game-desc {
            font-size: 16px;
            font-weight: 500;
            margin-top: 15px;
            max-width: 200px;
            line-height: 1.5;
            
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box; 
        }

        .text-singleplayer { color: #e98f4a; }
        .text-multiplayer { color: #e98f4a; }

    </style>
</head>

<body>
    <div class="bg-layer bg-singleplayer"></div>
    <div class="bg-layer bg-multiplayer"></div>

    <nav class="top-leiste">
        <div class="dropdown">
            <a href="#" class="dropbtn" onclick="toggleDropdown(event, 'menu-links')">☰ Menu</a>
            <div id="menu-links" class="dropdown-content">
                <a href="logout">Logout</a>
            </div>
        </div>

        <div style="font-size: 20px; font-weight: bold; letter-spacing: 1px; display: flex; justify-content: center; ">Hello <span id="username">{{username}}</span>!</div>
    </nav>

    <h1>Choose a Gamemode:</h1>

    <div class="game-grid">
        
        <div class="game-card">
            <a href="/tictactoe/singleplayer" target="_blank" class="klick-box box-singleplayer" title="Click here to play">Singleplayer</a>
            <div class="game-desc text-singleplayer">Spiele gegen eine künstliche Intelligenz</div>
        </div>

        <div class="game-card">
        <a href="/tictactoe/check_for_players" class="klick-box box-multiplayer" title="Click here to play">Multiplayer</a>            
        <div class="game-desc text-multiplayer">Spiele gegen deine Freunde oder völlig fremde Spieler</div>
        </div>

    </div>

    <script>
        function toggleDropdown(event, menuId) {
            event.preventDefault(); 

            let allMenus = document.querySelectorAll('.dropdown-content');
            allMenus.forEach(menu => {
                if (menu.id !== menuId) {
                    menu.classList.remove('show');
                }
            });

            document.getElementById(menuId).classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                let dropdowns = document.querySelectorAll('.dropdown-content');
                dropdowns.forEach(menu => {
                    if (menu.classList.contains('show')) {
                        menu.classList.remove('show');
                    }
                });
            }
        }
    </script>

    <script src="tictactoe.js"></script>

</body>
</html>
